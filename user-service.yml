server:
  port: 8082

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=ECommerceDb;encrypt=true;trustServerCertificate=true
    username: springuser
    password: Spring@123

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
